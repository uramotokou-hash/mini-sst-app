<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST カード - 学校のよくある場面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", "Meiryo", sans-serif;
  background: #fff9f0;
  min-height: 100vh;
  padding: 20px;
}

h1.app-title {
  text-align: center;
  font-size: 1.8rem;
  color: #ff7043;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

p.app-subtitle {
  text-align: center;
  font-size: 1rem;
  color: #888;
  margin-bottom: 24px;
}

/* ナビ */
.nav-bar {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.nav-btn {
  background: #fff;
  border: 2px solid #ffcc80;
  border-radius: 999px;
  padding: 6px 16px;
  font-size: 0.9rem;
  cursor: pointer;
  color: #e65100;
  transition: background 0.2s, color 0.2s;
}

.nav-btn.active, .nav-btn:hover {
  background: #ff7043;
  color: #fff;
  border-color: #ff7043;
}

/* カードラッパ */
.card-container {
  max-width: 520px;
  margin: 0 auto;
}

/* カード本体 */
.card {
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  overflow: hidden;
  padding-bottom: 28px;
}

/* カテゴリバッジ */
.category-badge {
  display: inline-block;
  background: #ffe0b2;
  color: #e65100;
  font-size: 0.85rem;
  font-weight: bold;
  border-radius: 999px;
  padding: 4px 14px;
  margin: 20px 0 0 20px;
}

/* イラスト */
.illust-wrap {
  background: #fff8ee;
  margin: 12px 20px 0;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  overflow: hidden;
}

/* 場面タイトル */
.scene-title {
  font-size: 1.35rem;
  font-weight: bold;
  color: #333;
  margin: 18px 20px 8px;
  line-height: 1.4;
}

/* 場面説明 */
.scene-desc {
  font-size: 1rem;
  color: #555;
  margin: 0 20px 16px;
  line-height: 1.7;
}

/* 吹き出し */
.balloon-wrap {
  margin: 0 20px 20px;
}

.balloon-label {
  font-size: 0.8rem;
  color: #ff7043;
  font-weight: bold;
  margin-bottom: 4px;
}

.balloon {
  position: relative;
  background: #fff3e0;
  border: 3px solid #ff7043;
  border-radius: 16px;
  padding: 14px 18px;
  font-size: 1.25rem;
  font-weight: bold;
  color: #bf360c;
  line-height: 1.5;
  display: inline-block;
  min-width: 60%;
}

.balloon::before {
  content: "";
  position: absolute;
  top: -20px;
  left: 28px;
  border: 10px solid transparent;
  border-bottom-color: #ff7043;
}

.balloon::after {
  content: "";
  position: absolute;
  top: -14px;
  left: 30px;
  border: 8px solid transparent;
  border-bottom-color: #fff3e0;
}

/* 考える問い */
.questions {
  margin: 0 20px 22px;
  background: #e8f5e9;
  border-radius: 14px;
  padding: 14px 18px;
}

.questions-title {
  font-size: 0.85rem;
  color: #388e3c;
  font-weight: bold;
  margin-bottom: 8px;
}

.questions li {
  list-style: none;
  font-size: 1rem;
  color: #2e7d32;
  padding: 4px 0;
  padding-left: 22px;
  position: relative;
  line-height: 1.5;
}

.questions li::before {
  content: "💭";
  position: absolute;
  left: 0;
}

/* ボタンエリア */
.btn-area {
  display: flex;
  gap: 12px;
  margin: 0 20px;
  justify-content: center;
}

.btn-prev, .btn-next {
  flex: 1;
  padding: 14px 0;
  border: none;
  border-radius: 999px;
  font-size: 1.05rem;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}

.btn-prev:active, .btn-next:active {
  transform: scale(0.97);
}

.btn-prev {
  background: #f5f5f5;
  color: #999;
}

.btn-next {
  background: #ff7043;
  color: #fff;
}

.btn-prev:disabled {
  opacity: 0.4;
  cursor: default;
}

/* ページ番号 */
.page-indicator {
  text-align: center;
  margin-top: 18px;
  display: flex;
  gap: 8px;
  justify-content: center;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ffd0b5;
  transition: background 0.2s;
}

.dot.active {
  background: #ff7043;
}

@media (max-width: 480px) {
  h1.app-title { font-size: 1.4rem; }
  .scene-title { font-size: 1.15rem; }
  .balloon { font-size: 1.1rem; }
}
</style>
</head>
<body>

<h1 class="app-title">🌟 SST カード</h1>
<p class="app-subtitle">学校のよくある場面を考えよう</p>

<div class="nav-bar" id="navBar"></div>

<div class="card-container">
  <div class="card" id="mainCard">
    <span class="category-badge" id="cardCategory"></span>
    <div class="illust-wrap" id="cardIllust"></div>
    <div class="scene-title" id="cardTitle"></div>
    <div class="scene-desc" id="cardDesc"></div>
    <div class="balloon-wrap">
      <div class="balloon-label">👤 はじめの一言</div>
      <div class="balloon" id="cardBalloon"></div>
    </div>
    <div class="questions">
      <div class="questions-title">🤔 考えてみよう</div>
      <ul id="cardQuestions"></ul>
    </div>
    <div class="btn-area">
      <button class="btn-prev" id="btnPrev" onclick="move(-1)">◀ もどる</button>
      <button class="btn-next" id="btnNext" onclick="move(1)">つぎへ ▶</button>
    </div>
  </div>
  <div class="page-indicator" id="pageIndicator"></div>
</div>

// -------- カード表示ロジック --------
let current = 0;

function renderCard(idx) {
  const s = scenes[idx];

  document.getElementById("cardCategory").textContent = s.category;
  document.getElementById("cardIllust").innerHTML = s.svg;
  document.getElementById("cardTitle").textContent = s.title;
  document.getElementById("cardDesc").textContent = s.desc;
  document.getElementById("cardBalloon").textContent = s.firstWord;

  const ul = document.getElementById("cardQuestions");
  ul.innerHTML = "";
  s.questions.forEach(q => {
    const li = document.createElement("li");
    li.textContent = q;
    ul.appendChild(li);
  });

  document.getElementById("btnPrev").disabled = (idx === 0);
  document.getElementById("btnNext").disabled = (idx === scenes.length - 1);
  if (idx === scenes.length - 1) {
    document.getElementById("btnNext").textContent = "さいご ✓";
  } else {
    document.getElementById("btnNext").textContent = "つぎへ ▶";
  }

  // ドット更新
  const dots = document.querySelectorAll(".dot");
  dots.forEach((d, i) => d.classList.toggle("active", i === idx));

  // ナビボタン更新
  const navBtns = document.querySelectorAll(".nav-btn");
  navBtns.forEach((b, i) => b.classList.toggle("active", i === idx));

  // カードをふわっと表示
  const card = document.getElementById("mainCard");
  card.style.opacity = "0";
  card.style.transform = "translateY(10px)";
  requestAnimationFrame(() => {
    card.style.transition = "opacity 0.3s ease, transform 0.3s ease";
    card.style.opacity = "1";
    card.style.transform = "translateY(0)";
  });
}

function move(dir) {
  const next = current + dir;
  if (next < 0 || next >= scenes.length) return;
  current = next;
  renderCard(current);
}

function goTo(idx) {
  current = idx;
  renderCard(current);
}

// ナビバー生成
function buildNav() {
  const bar = document.getElementById("navBar");
  scenes.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-btn" + (i === 0 ? " active" : "");
    btn.textContent = (i + 1) + ". " + s.title;
    btn.onclick = () => goTo(i);
    bar.appendChild(btn);
  });
}

// ページドット生成
function buildDots() {
  const pi = document.getElementById("pageIndicator");
  scenes.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.onclick = () => goTo(i);
    d.style.cursor = "pointer";
    pi.appendChild(d);
  });
}

buildNav();
buildDots();
renderCard(0);
